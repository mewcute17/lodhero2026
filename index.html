<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warcraft Balance Log — Search Patches</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-aurora" aria-hidden="true"></div>
  <header class="site-header">
    <div class="brand">
      <span class="brand-icon" aria-hidden="true">⚔</span>
      <div>
        <h1>Warcraft Balance Log</h1>
        <p class="tagline">Search units, abilities, AI tuning &amp; drop tables — buffs, nerfs &amp; reworks in one place.</p>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="search-panel" aria-label="Search filters">
      <div class="search-row">
        <label class="sr-only" for="q">Search</label>
        <input
          type="search"
          id="q"
          class="search-input"
          placeholder="Search name, keyword, or patch (e.g. frost, 2.0, creep)…"
          autocomplete="off"
        />
        <button type="button" class="btn-clear" id="clear" title="Clear">Clear</button>
      </div>
      <div class="filter-row">
        <span class="filter-label">Category</span>
        <div class="chips" id="category-chips" role="group" aria-label="Category"></div>
      </div>
      <div class="filter-row">
        <span class="filter-label">Change</span>
        <div class="chips" id="change-chips" role="group" aria-label="Change type"></div>
      </div>
      <p class="meta" id="result-count"></p>
    </section>

    <section class="results" aria-live="polite" aria-atomic="false">
      <ul class="card-list" id="results"></ul>
      <p class="empty" id="empty" hidden>No entries match your filters.</p>
    </section>
  </main>

  <footer class="site-footer">
    <p>Demo dataset for layout &amp; search — replace <code>js/data.js</code> with your patch notes or API feed.</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
